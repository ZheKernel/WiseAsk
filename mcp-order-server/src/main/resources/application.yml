server:
  address: localhost
  port: 9100

spring:
  application:
    name: ragent-order-mcp-server
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${ORDER_DB_URL:jdbc:postgresql://localhost:5432/ragent}
    username: ${ORDER_DB_USERNAME:postgres}
    password: ${ORDER_DB_PASSWORD:postgres}
    hikari:
      read-only: true
      connection-timeout: 5000
      maximum-pool-size: 5
      minimum-idle: 1

order-mcp:
  auth:
    issuer: ${AUTH_SERVER_ISSUER:http://localhost:9200}
    jwk-set-uri: ${AUTH_SERVER_JWK_SET_URI:http://localhost:9200/oauth2/jwks}
    audience: ${ORDER_MCP_AUDIENCE:order-mcp}
    resource: ${ORDER_MCP_RESOURCE:http://localhost:9100}
